kind = "web"
previewPath = "/"
title = "Wall St. Launchpad"
version = "1.0.0"
id = "artifacts/wall-st-launchpad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24644

[services.development]
run = "pnpm --filter @workspace/wall-st-launchpad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wall-st-launchpad", "run", "build" ]
publicDir = "artifacts/wall-st-launchpad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24644"
BASE_PATH = "/"
